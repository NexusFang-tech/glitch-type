<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GLITCH::TYPE — Cyberpunk Text Effects Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--pink:#ff2d78;--purple:#a020f0;--cyan:#00eeff;--yellow:#ffe600;
--bg:#07000f;--bg2:#0d0020;--text:#e8deff;--muted:#7a6a9a;
--glass:rgba(13,0,32,0.85);--border:rgba(160,32,240,0.3);
}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;font-size:15px;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;
background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px)}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9998;
background:radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,0.5) 100%)}
#grid-canvas{position:fixed;inset:0;z-index:0;width:100%;height:100%}
.app{position:relative;z-index:1;max-width:1000px;margin:0 auto;padding:24px 20px}
h1{font-family:'Orbitron',sans-serif;font-size:28px;letter-spacing:4px;color:var(--cyan);text-shadow:0 0 20px rgba(0,238,255,0.5);margin-bottom:4px}
.subtitle{font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--muted);letter-spacing:2px;margin-bottom:24px}
.input-row{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.input-row input[type="text"]{
flex:1;min-width:200px;padding:10px 16px;font-family:'Share Tech Mono',monospace;font-size:18px;
background:rgba(7,0,15,0.8);border:1px solid var(--border);color:var(--cyan);border-radius:4px;outline:none}
.input-row input[type="text"]:focus{border-color:var(--cyan);box-shadow:0 0 12px rgba(0,238,255,0.3)}
.effects{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.fx-btn{
font-family:'Orbitron',sans-serif;font-size:11px;padding:6px 14px;letter-spacing:1px;text-transform:uppercase;
border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;border-radius:3px;transition:all .15s}
.fx-btn:hover{border-color:var(--cyan);color:var(--cyan);background:rgba(0,238,255,0.05)}
.fx-btn.active{border-color:var(--pink);color:var(--pink);background:rgba(255,45,120,0.1);box-shadow:0 0 12px rgba(255,45,120,0.2)}
.controls{display:flex;gap:20px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
.ctrl{display:flex;align-items:center;gap:8px}
.ctrl label{font-family:'Orbitron',sans-serif;font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.ctrl span{font-family:'Share Tech Mono',monospace;font-size:14px;color:var(--cyan);min-width:30px}
input[type="range"]{-webkit-appearance:none;appearance:none;width:120px;height:4px;background:var(--border);border-radius:2px;outline:none}
input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--cyan);cursor:pointer;border:2px solid var(--bg)}
input[type="range"]::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:var(--cyan);cursor:pointer;border:2px solid var(--bg)}
input[type="color"]{width:32px;height:28px;padding:0;border:1px solid var(--border);border-radius:3px;cursor:pointer;background:transparent}
.canvas-wrap{
position:relative;width:100%;border-radius:6px;border:1px solid var(--border);overflow:hidden;
background:#0a0014;box-shadow:0 0 40px rgba(160,32,240,0.15)}
.canvas-wrap canvas{display:block;width:100%;height:360px}
.actions{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.action-btn{
font-family:'Orbitron',sans-serif;font-size:10px;padding:8px 18px;letter-spacing:1px;text-transform:uppercase;
border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;border-radius:3px;transition:all .15s}
.action-btn:hover{border-color:var(--cyan);color:var(--cyan);background:rgba(0,238,255,0.05)}
.toast{
position:absolute;bottom:14px;left:50%;transform:translateX(-50%) translateY(30px);
background:rgba(13,0,32,0.95);border:1px solid var(--cyan);color:var(--cyan);
font-family:'Share Tech Mono',monospace;font-size:12px;padding:6px 18px;border-radius:3px;
opacity:0;transition:all .3s;pointer-events:none;z-index:10}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.footer{text-align:center;margin-top:24px;font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--muted)}
@media(max-width:600px){
h1{font-size:20px}
.controls{gap:12px}
input[type="range"]{width:80px}
}
</style>
</head>
<body>
<canvas id="grid-canvas"></canvas>
<div class="app">
<h1>GLITCH::TYPE</h1>
<div class="subtitle">CYBERPUNK TEXT EFFECTS GENERATOR // NEXUSFANG-TECH</div>

<div class="input-row">
<input type="text" id="gt-text" value="NEXUSFANG" placeholder="Type something..." spellcheck="false" />
</div>

<div class="effects" id="gt-effects">
<button class="fx-btn active" data-fx="glitch">Glitch</button>
<button class="fx-btn" data-fx="neon">Neon Flicker</button>
<button class="fx-btn" data-fx="matrix">Matrix Rain</button>
<button class="fx-btn" data-fx="scanline">Scanline</button>
<button class="fx-btn" data-fx="hologram">Hologram</button>
<button class="fx-btn" data-fx="chromatic">Chromatic</button>
<button class="fx-btn" data-fx="typewriter">Typewriter</button>
</div>

<div class="controls">
<div class="ctrl"><label>Size</label><input type="range" min="24" max="120" value="64" step="1" id="gt-size" /><span id="gt-size-val">64</span></div>
<div class="ctrl"><label>Intensity</label><input type="range" min="1" max="100" value="50" step="1" id="gt-intensity" /><span id="gt-intensity-val">50</span></div>
<div class="ctrl"><label>Color</label><input type="color" value="#00eeff" id="gt-color" /></div>
<div class="ctrl"><label>BG</label><input type="color" value="#0a0014" id="gt-bg" /></div>
</div>

<div class="canvas-wrap" id="gt-canvas-wrap">
<canvas id="gt-canvas"></canvas>
<div class="toast" id="gt-toast"></div>
</div>

<div class="actions">
<button class="action-btn" id="gt-export">&#8615; Export PNG</button>
<button class="action-btn" id="gt-randomize">&#9632; Randomize</button>
<button class="action-btn" id="gt-pause">&#9646;&#9646; Pause</button>
</div>

<div class="footer">GLITCH::TYPE v1.0 // NexusFang-Tech</div>
</div>

<script>
(function(){
const c=document.getElementById('grid-canvas'),x=c.getContext('2d');
function resize(){c.width=window.innerWidth;c.height=window.innerHeight}
resize();window.addEventListener('resize',resize);
let off=0;
function draw(){
x.clearRect(0,0,c.width,c.height);
const g=x.createLinearGradient(0,0,0,c.height);
g.addColorStop(0,'#07000f');g.addColorStop(0.5,'#0d0020');g.addColorStop(1,'#120030');
x.fillStyle=g;x.fillRect(0,0,c.width,c.height);
x.strokeStyle='rgba(160,32,240,0.08)';x.lineWidth=1;
for(let i=0;i<c.width;i+=40){x.beginPath();x.moveTo(i,0);x.lineTo(i,c.height);x.stroke()}
const h=c.height*0.55;
for(let y=0;y<30;y++){const t=(y+off%1)/30;const yy=h+Math.pow(t,1.8)*(c.height-h);
x.strokeStyle=`rgba(160,32,240,${0.04+t*0.12})`;x.beginPath();x.moveTo(0,yy);x.lineTo(c.width,yy);x.stroke()}
const cx=c.width/2;
for(let i=-15;i<=15;i++){const a=0.06-Math.abs(i)*0.003;if(a<=0)continue;
x.strokeStyle=`rgba(0,238,255,${a})`;x.beginPath();x.moveTo(cx+i*120,h);x.lineTo(cx+i*200,c.height);x.stroke()}
const sg=x.createRadialGradient(cx,h-60,10,cx,h-60,80);
sg.addColorStop(0,'rgba(255,45,120,0.4)');sg.addColorStop(0.5,'rgba(160,32,240,0.15)');sg.addColorStop(1,'transparent');
x.fillStyle=sg;x.fillRect(cx-100,h-150,200,150);
off+=0.03;requestAnimationFrame(draw)}
draw()})();

const canvas=document.getElementById('gt-canvas'),ctx=canvas.getContext('2d');
const W=1200,H=720;canvas.width=W;canvas.height=H;
let currentFx='glitch',text='NEXUSFANG',fontSize=64,intensity=50,mainColor='#00eeff',bgColor='#0a0014',paused=false,frame=0,typewriterPos=0,typewriterTimer=0,matrixDrops=[];

function hexToRgb(h){return{r:parseInt(h.slice(1,3),16),g:parseInt(h.slice(3,5),16),b:parseInt(h.slice(5,7),16)}}
function initMatrix(){matrixDrops=Array.from({length:Math.floor(W/14)},()=>Math.random()*-50)}
initMatrix();
function drawBg(){ctx.fillStyle=bgColor;ctx.fillRect(0,0,W,H)}
function baseText(x,y,col,alpha){ctx.save();ctx.globalAlpha=alpha||1;ctx.font=`bold ${fontSize}px "Orbitron","Arial Black",Impact,sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle=col||mainColor;ctx.fillText(text,x,y);ctx.restore()}

function fxGlitch(){drawBg();const cx=W/2,cy=H/2,int=intensity/100;baseText(cx,cy,mainColor,1);
if(Math.random()<0.3+int*0.5){const s=(Math.random()-0.5)*int*40,rgb=hexToRgb(mainColor);ctx.save();ctx.globalCompositeOperation='lighter';ctx.globalAlpha=0.6;baseText(cx+s,cy,`rgb(${rgb.r},0,0)`,0.5);baseText(cx-s,cy,`rgb(0,${rgb.g},${rgb.b})`,0.5);ctx.restore()}
for(let i=0;i<Math.floor(3+int*12);i++){if(Math.random()>0.4+(1-int)*0.5)continue;const sy=Math.random()*H,sh=2+Math.random()*int*30,sx=(Math.random()-0.5)*int*60;const d=ctx.getImageData(0,Math.floor(sy),W,Math.floor(sh));ctx.putImageData(d,Math.floor(sx),Math.floor(sy))}
if(Math.random()<int*0.15){ctx.fillStyle=bgColor;ctx.fillRect(0,0,W,H);const rgb=hexToRgb(mainColor);baseText(cx+(Math.random()-0.5)*20,cy+(Math.random()-0.5)*10,`rgb(${rgb.r},${Math.floor(rgb.g*0.5)},${Math.floor(rgb.b*0.5)})`,0.8)}}

function fxNeon(){drawBg();const cx=W/2,cy=H/2,int=intensity/100;const fl=Math.sin(frame*0.15)*0.3+Math.sin(frame*0.47)*0.2,alpha=0.5+fl*int+0.3,gs=8+int*20;
ctx.save();ctx.shadowColor=mainColor;ctx.font=`bold ${fontSize}px "Orbitron","Arial Black",Impact,sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle=mainColor;ctx.globalAlpha=Math.max(0.2,Math.min(1,alpha));
for(let p=0;p<3;p++){ctx.shadowBlur=gs*(1+p*0.8)*(0.6+fl*0.6);ctx.fillText(text,cx,cy)}
ctx.shadowBlur=0;ctx.globalAlpha=1;ctx.fillStyle='#fff';ctx.globalAlpha=Math.max(0.3,Math.min(1,alpha+0.2));ctx.fillText(text,cx,cy);ctx.restore();
if(Math.random()<int*0.08){ctx.save();ctx.globalAlpha=0.03;ctx.fillStyle=mainColor;ctx.fillRect(0,0,W,H);ctx.restore()}}

function fxMatrix(){ctx.fillStyle=bgColor;ctx.globalAlpha=0.12;ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;const int=intensity/100;
const chars='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789@#$%^&*アイウエオカキクケコサシスセソ';
ctx.font='14px monospace';ctx.fillStyle=mainColor;
for(let i=0;i<matrixDrops.length;i++){const ch=chars[Math.floor(Math.random()*chars.length)],y=matrixDrops[i]*16;
ctx.globalAlpha=0.6+Math.random()*0.4;ctx.fillText(ch,i*14,y);
if(y>H&&Math.random()>0.98-int*0.02)matrixDrops[i]=0;matrixDrops[i]+=0.4+int*0.6}
ctx.globalAlpha=1;const cx=W/2,cy=H/2;ctx.save();ctx.font=`bold ${fontSize}px "Orbitron","Arial Black",Impact,sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
const m=ctx.measureText(text);ctx.fillStyle=bgColor;ctx.fillRect(cx-m.width/2-12,cy-fontSize/2-8,m.width+24,fontSize+16);
ctx.shadowColor=mainColor;ctx.shadowBlur=15;ctx.fillStyle=mainColor;ctx.fillText(text,cx,cy);ctx.shadowBlur=0;ctx.fillStyle='#fff';ctx.globalAlpha=0.7;ctx.fillText(text,cx,cy);ctx.restore()}

function fxScanline(){drawBg();const cx=W/2,cy=H/2,int=intensity/100;ctx.save();ctx.shadowColor=mainColor;ctx.shadowBlur=10;baseText(cx,cy,mainColor,1);ctx.shadowBlur=0;ctx.restore();
ctx.fillStyle='#fff';ctx.globalAlpha=0.4;ctx.font=`bold ${fontSize}px "Orbitron","Arial Black",Impact,sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(text,cx,cy);ctx.globalAlpha=1;
for(let y=0;y<H;y+=3){ctx.fillStyle=bgColor;ctx.globalAlpha=0.15+int*0.2;ctx.fillRect(0,y,W,1)}
ctx.globalAlpha=1;const sy=(frame*(1+int*3))%(H+40)-20;const g=ctx.createLinearGradient(0,sy-20,0,sy+20);g.addColorStop(0,'transparent');g.addColorStop(0.5,mainColor);g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.globalAlpha=0.08+int*0.12;ctx.fillRect(0,sy-20,W,40);ctx.globalAlpha=1}

function fxHologram(){drawBg();const cx=W/2,cy=H/2,int=intensity/100,wb=Math.sin(frame*0.08)*int*6,rgb=hexToRgb(mainColor);
for(let i=5;i>=0;i--){const yOff=Math.sin(frame*0.05+i*0.5)*int*4;baseText(cx,cy+yOff+i*2,mainColor,0.04+(5-i)*0.03)}
ctx.save();ctx.globalCompositeOperation='lighter';baseText(cx-1,cy+wb,`rgba(${rgb.r},0,0,0.3)`,0.3);baseText(cx+1,cy+wb,`rgba(0,${rgb.g},${rgb.b},0.3)`,0.3);ctx.restore();
baseText(cx,cy+wb,mainColor,0.85);ctx.fillStyle='#fff';ctx.globalAlpha=0.5;ctx.font=`bold ${fontSize}px "Orbitron","Arial Black",Impact,sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(text,cx,cy+wb);ctx.globalAlpha=1;
for(let y=0;y<H;y+=2){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,y,W,1)}
if(Math.random()<int*0.1){const ty=Math.random()*H;ctx.fillStyle=bgColor;ctx.globalAlpha=0.8;ctx.fillRect(0,ty,W,2+Math.random()*10);ctx.globalAlpha=1}}

function fxChromatic(){drawBg();const cx=W/2,cy=H/2,int=intensity/100;const sp=2+int*12+Math.sin(frame*0.06)*int*4,a=frame*0.02,dx=Math.cos(a)*sp,dy=Math.sin(a)*sp;
ctx.save();ctx.globalCompositeOperation='lighter';ctx.font=`bold ${fontSize}px "Orbitron","Arial Black",Impact,sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
ctx.fillStyle='rgba(255,0,0,0.7)';ctx.fillText(text,cx-dx,cy-dy);ctx.fillStyle='rgba(0,255,0,0.7)';ctx.fillText(text,cx,cy);ctx.fillStyle='rgba(0,100,255,0.7)';ctx.fillText(text,cx+dx,cy+dy);ctx.restore();
ctx.fillStyle='#fff';ctx.globalAlpha=0.35;ctx.font=`bold ${fontSize}px "Orbitron","Arial Black",Impact,sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(text,cx,cy);ctx.globalAlpha=1}

function fxTypewriter(){drawBg();const cx=W/2,cy=H/2,int=intensity/100;typewriterTimer++;const spd=Math.max(2,12-int*10);
if(typewriterTimer>=spd){typewriterTimer=0;typewriterPos++;if(typewriterPos>text.length+15)typewriterPos=0}
const shown=text.substring(0,Math.min(typewriterPos,text.length));ctx.save();ctx.font=`bold ${fontSize}px "Orbitron","Arial Black",Impact,sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
ctx.shadowColor=mainColor;ctx.shadowBlur=6;ctx.fillStyle=mainColor;ctx.fillText(shown,cx,cy);ctx.shadowBlur=0;ctx.fillStyle='#fff';ctx.globalAlpha=0.5;ctx.fillText(shown,cx,cy);ctx.globalAlpha=1;
if(typewriterPos<=text.length&&Math.floor(frame/8)%2===0){const m=ctx.measureText(shown);ctx.fillStyle=mainColor;ctx.fillRect(cx+m.width/2+4,cy-fontSize*0.4,3,fontSize*0.8)}
ctx.restore()}

const effects={glitch:fxGlitch,neon:fxNeon,matrix:fxMatrix,scanline:fxScanline,hologram:fxHologram,chromatic:fxChromatic,typewriter:fxTypewriter};

function render(){if(!paused){frame++;const fn=effects[currentFx];if(fn)fn()}requestAnimationFrame(render)}

document.getElementById('gt-text').addEventListener('input',e=>{text=e.target.value||'TYPE SOMETHING';typewriterPos=0;if(currentFx==='matrix'){initMatrix();ctx.clearRect(0,0,W,H)}});
document.querySelectorAll('.fx-btn').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('.fx-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');currentFx=btn.dataset.fx;typewriterPos=0;if(currentFx==='matrix'){initMatrix();ctx.fillStyle=bgColor;ctx.globalAlpha=1;ctx.fillRect(0,0,W,H)}})});
document.getElementById('gt-size').addEventListener('input',e=>{fontSize=parseInt(e.target.value);document.getElementById('gt-size-val').textContent=fontSize});
document.getElementById('gt-intensity').addEventListener('input',e=>{intensity=parseInt(e.target.value);document.getElementById('gt-intensity-val').textContent=intensity});
document.getElementById('gt-color').addEventListener('input',e=>{mainColor=e.target.value});
document.getElementById('gt-bg').addEventListener('input',e=>{bgColor=e.target.value});

document.getElementById('gt-export').addEventListener('click',()=>{const link=document.createElement('a');link.download=`glitchtype_${text.replace(/[^a-zA-Z0-9]/g,'_')}.png`;link.href=canvas.toDataURL('image/png');link.click();showToast('PNG exported')});
document.getElementById('gt-pause').addEventListener('click',function(){paused=!paused;this.innerHTML=paused?'&#9654; Play':'&#9646;&#9646; Pause'});
document.getElementById('gt-randomize').addEventListener('click',()=>{const fxKeys=Object.keys(effects);currentFx=fxKeys[Math.floor(Math.random()*fxKeys.length)];document.querySelectorAll('.fx-btn').forEach(b=>{b.classList.toggle('active',b.dataset.fx===currentFx)});mainColor='#'+Math.floor(Math.random()*0xffffff).toString(16).padStart(6,'0');document.getElementById('gt-color').value=mainColor;intensity=30+Math.floor(Math.random()*60);document.getElementById('gt-intensity').value=intensity;document.getElementById('gt-intensity-val').textContent=intensity;fontSize=48+Math.floor(Math.random()*40);document.getElementById('gt-size').value=fontSize;document.getElementById('gt-size-val').textContent=fontSize;typewriterPos=0;if(currentFx==='matrix'){initMatrix();ctx.fillStyle=bgColor;ctx.globalAlpha=1;ctx.fillRect(0,0,W,H)}showToast('Randomized: '+currentFx)});

function showToast(msg){const t=document.getElementById('gt-toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1500)}
render();
</script>
</body>
</html>
